version: '3.8'

services:
  db:
    image: postgres:15
    container_name: eshop-db
    environment:
      POSTGRES_DB: eshop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test1234
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./store
    container_name: eshop-app
    ports:
      - "8081:8081"
    depends_on:
      - db